version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sosc_postgres
    environment:
      POSTGRES_USER: sosc_user
      POSTGRES_PASSWORD: sosc_password
      POSTGRES_DB: sosc_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: sosc_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: sosc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: sosc_backend
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    command: flask run --host=0.0.0.0 --debug

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: sosc_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
