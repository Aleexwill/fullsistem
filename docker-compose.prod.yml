# Stack de produccion - usar con: docker compose -f docker-compose.prod.yml up -d
# Requiere .env.production en la raiz (ver .env.production.example)

services:
  postgres:
    image: postgres:16-alpine
    container_name: sosc_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - sosc_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7-alpine
    container_name: sosc_redis_prod
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - sosc_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  minio:
    image: minio/minio:latest
    container_name: sosc_minio_prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - sosc_internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sosc-backend:latest
    container_name: sosc_backend_prod
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sosc_internal
      - sosc_public
    deploy:
      resources:
        limits:
          memory: 1g

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sosc-backend:latest
    container_name: sosc_celery_worker_prod
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info", "--concurrency=2"]
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - sosc_internal
    deploy:
      resources:
        limits:
          memory: 512m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: sosc-frontend:latest
    container_name: sosc_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sosc_public
    ports:
      # Si vas a poner Caddy/Traefik delante, comenta este puerto y usa solo la red.
      - "80:80"
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  sosc_internal:
    driver: bridge
    internal: false
  sosc_public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
